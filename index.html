<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Productivity App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <button onclick="toggleTheme()" class="theme-btn">Toggle Theme</button>
    <h1>Student Productivity App</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter task..." />
      <input type="text" id="subjectInput" placeholder="Subject" />
      <input type="date" id="dateInput" />
      <button onclick="addTask()">Add Task</button>
    </div>

    <div class="controls">
  <input type="text" id="searchInput" placeholder="Search task..." onkeyup="renderTasks()" />

  <div class="filters">
  <button class="all-btn" onclick="setFilter('all')">All</button>
  <button class="pending-btn" onclick="setFilter('pending')">Pending</button>
  <button class="completed-btn" onclick="setFilter('completed')">Completed</button>
</div>

  <button onclick="clearAll()" class="clear-btn">Clear All</button>
</div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
